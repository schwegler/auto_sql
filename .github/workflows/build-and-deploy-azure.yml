name: Build and Deploy to Azure SQL

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Database Project
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build SQL Database Project
        run: dotnet build src/Database/Database.sqlproj -c Release

      - name: Upload DACPAC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-dacpac
          path: src/Database/bin/Release/Database.dacpac

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build
    outputs:
      sqlServerFqdn: ${{ steps.deploy-bicep.outputs.sqlServerFqdn }}
      sqlDatabaseName: ${{ steps.deploy-bicep.outputs.sqlDatabaseName }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep Resources
        id: deploy-bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: ./infra/azure/main.bicep
          parameters: >
            ./infra/azure/main.parameters.json
            administratorLoginPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
          failOnStdErr: false

  deploy-database:
    name: Deploy Schema (DACPAC)
    runs-on: ubuntu-latest
    needs: [build, deploy-infra]

    steps:
      - name: Download DACPAC Artifact
        uses: actions/download-artifact@v4
        with:
          name: database-dacpac
          path: ./dacpac

      - name: Deploy Schema to Azure SQL
        uses: azure/sql-action@v2
        with:
          connection-string: 'Server=tcp:${{ needs.deploy-infra.outputs.sqlServerFqdn }},1433;Initial Catalog=${{ needs.deploy-infra.outputs.sqlDatabaseName }};Persist Security Info=False;User ID=${{ secrets.SQL_ADMIN_USER }};Password=${{ secrets.SQL_ADMIN_PASSWORD }};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;'
          path: ./dacpac/Database.dacpac
          action: 'Publish'
          arguments: '/p:ExcludeObjectTypes=Users;RoleMemberships'
